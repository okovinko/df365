<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <title>Swagger</title>
  <link href="./standalone/swagger/5.20.2/swagger-ui.css" rel="stylesheet" type="text/css">


</head>
<body>

<div id="swagger-ui"></div>

<script src="./standalone/swagger/5.20.2/swagger-ui-standalone-preset.js"></script>
<script src="./standalone/swagger/5.20.2/swagger-ui-bundle.js"></script>

<script>

  window.onload = function () {
    // Build a system
    const ui = SwaggerUIBundle({
      url: "openapi.yaml",
      dom_id: '#swagger-ui',
      deepLinking: true,
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIStandalonePreset
      ],
      plugins: [
        SwaggerUIBundle.plugins.DownloadUrl
      ],
      layout: "StandaloneLayout",
    });
    window.ui = ui
  }
</script>
</body>
</html>
