        - role
      properties:
        role:
          $ref: '#/components/schemas/userRoles'
        position:
          allOf:
            - $ref: '#/components/schemas/position'
          default: null
          description: Job position title.
        status:
          allOf:
            - $ref: '#/components/schemas/statuses'
          default: ACTIVE
