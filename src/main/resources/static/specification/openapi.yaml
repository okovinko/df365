  responses:
    '204':
      description: Empty response indicates successful completion
    '400':
      description: 400 error response returning an error code object
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiRestResponse'
    '500':
      description: 500 error response returning an error code object
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiRestResponse500'
  parameters:
    acceptLanguage:
      name: Accept-Language
      in: header
      required: false
      schema:
        type: string
        default: en
      description: Tells the server which locale is preferred
    correlationId:
      name: Correlation-Id
      in: header
      required: false
      schema:
        type: string
        nullable: true
        pattern: '^[0-9A-Za-z]{8}$'
      description: Header for request correlation # added
    orgOguid:
      in: path
      name: orgOguid
      required: true
      schema:
        $ref: '#/components/schemas/oguid'
      description: Organization GUID
    userOguid:
      in: path
      name: userOguid
      required: true
      schema:
        $ref: '#/components/schemas/oguid'
      description: User OGUID
    appOguid:
      name: appOguid
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/oguid'
      description: appOguid identifier
    departmentOguid:
      in: path
      name: departmentOguid
      required: true
      schema:
        $ref: '#/components/schemas/oguid'
      description: Department OGUID
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
