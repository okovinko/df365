        transactionId:
          $ref: '#/components/schemas/transactionId'
        code:
          $ref: '#/components/schemas/verificationCode'
    verificationCode:
      type: string
      pattern: ^[0-9]{6}$
      example: 123456
    transactionId:
      type: string
      pattern: ^([A-Za-z0-9_-]){7}$
      example: cFbuSBJ
    UserBase:
      type: object
      additionalProperties: false
      required:
        - lastName
        - firstName
        - middleName
        - email
        - phone
        - locale
        - timeZone
        - department
