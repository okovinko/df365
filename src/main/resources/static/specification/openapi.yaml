        - required:
            - email
        - required:
            - phone
      properties:
        firstName:
          $ref: '#/components/schemas/firstName'
        lastName:
          $ref: '#/components/schemas/lastName'
        middleName:
          $ref: '#/components/schemas/middleNameN'
        email:
          allOf:
            - $ref: '#/components/schemas/email'
          nullable: true
          default: null
          description: Email address of the user.
          example: user@example.com
        phone:
          allOf:
            - $ref: '#/components/schemas/phone'
          nullable: true
          default: null
          description: Phone number in E.164 format, including the leading '+'.
          example: '+12025550123'
        locale:
          allOf:
            - $ref: '#/components/schemas/locale'
            - default: en_US
          description: IETF BCP 47 language tag representing the user's preferred locale (e.g., 'en-US').
